  <text x="24" y="178" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Architecture</text>
  <text x="24" y="196" font-family="sans-serif" font-size="12" fill="#b1bac4">Systems design, resilient and sovereign systems</text>
  <text x="248" y="178" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Engineering</text>
  <text x="248" y="196" font-family="sans-serif" font-size="12" fill="#b1bac4">Software solutions, consulting</text>
