  <rect x="24" y="268" width="3" height="52" fill="#22c55e" rx="1"/>
  <text x="40" y="292" font-family="sans-serif" font-size="12" font-style="italic" fill="#b1bac4">Architecture and software engineering for meaningful digital systems.</text>
  <text x="40" y="306" font-family="sans-serif" font-size="10" fill="#8b949e">Solutions and Engineering</text>
