  <text x="40" y="192" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.15em">TECH AND PRACTICE</text>
  <text x="40" y="216" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Architecture</text>
  <text x="40" y="234" font-family="sans-serif" font-size="12" fill="#b1bac4">Systems design, resilient and sovereign systems</text>
  <text x="40" y="258" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Engineering</text>
  <text x="40" y="276" font-family="sans-serif" font-size="12" fill="#b1bac4">Software solutions, consulting</text>
  <text x="40" y="300" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Consciousness</text>
  <text x="40" y="318" font-family="sans-serif" font-size="12" fill="#b1bac4">Integration, life systems, conversations</text>
  <line x1="40" y1="338" x2="680" y2="338" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="348" width="4" height="164" fill="#15803d" opacity="0.4"/>
  <text x="40" y="372" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.15em">FOCUS AREAS</text>
  <rect x="40" y="388" width="640" height="56" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5"/>
  <rect x="40" y="388" width="3" height="56" fill="#22c55e" rx="1"/>
  <text x="56" y="410" font-family="sans-serif" font-size="12" font-style="italic" fill="#b1bac4">Architecture and software engineering for</text>
  <text x="56" y="426" font-family="sans-serif" font-size="12" font-style="italic" fill="#b1bac4">meaningful digital systems.</text>
  <text x="56" y="438" font-family="sans-serif" font-size="10" fill="#8b949e">Solutions and Engineering</text>
  <rect x="40" y="456" width="640" height="56" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5"/>
  <rect x="40" y="456" width="3" height="56" fill="#15803d" rx="1"/>
  <text x="56" y="478" font-family="sans-serif" font-size="12" font-style="italic" fill="#b1bac4">Resilient systems, sovereignty and sustainable tech.</text>
  <text x="56" y="504" font-family="sans-serif" font-size="10" fill="#8b949e">Digital Sovereignty</text>
  <rect x="40" y="524" width="640" height="56" fill="#161b22" rx="6" stroke="#30363d" stroke-width="0.5"/>
  <rect x="40" y="524" width="3" height="56" fill="#4ade80" rx="1"/>
  <text x="56" y="546" font-family="sans-serif" font-size="12" font-style="italic" fill="#b1bac4">Conversations and practice around mind, life</text>
  <text x="56" y="562" font-family="sans-serif" font-size="12" font-style="italic" fill="#b1bac4">and integration.</text>
  <text x="56" y="572" font-family="sans-serif" font-size="10" fill="#8b949e">Consciousness and Integration</text>
