<svg xmlns="http://www.w3.org/2000/svg" width="720" height="600" viewBox="0 0 720 600">
  <rect width="720" height="600" fill="#0d1117"/>
  <rect x="0" y="0" width="4" height="132" fill="#d4af37" opacity="0.6"/>
  <text x="40" y="32" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.15em">ABOUT ME</text>
  <text x="40" y="56" font-family="sans-serif" font-size="14" fill="#b1bac4">Exploring the intersection between technology,</text>
  <text x="40" y="76" font-family="sans-serif" font-size="14" fill="#b1bac4">consciousness and existential sovereignty.</text>
  <text x="40" y="102" font-family="sans-serif" font-size="13" fill="#8b949e">Solutions architecture and software engineering.</text>
  <text x="40" y="122" font-family="sans-serif" font-size="13" fill="#8b949e">Digital sovereignty and resilient systems. Focus on</text>
  <text x="40" y="142" font-family="sans-serif" font-size="13" fill="#8b949e">mind-life integration, nature and living systems.</text>
  <line x1="40" y1="158" x2="680" y2="158" stroke="#30363d" stroke-width="1"/>
