  <text x="72" y="254" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="600">Architecture</text>
  <text x="72" y="278" font-family="sans-serif" font-size="13" fill="#b1bac4">Systems design, resilient and</text>
