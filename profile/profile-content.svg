<svg xmlns="http://www.w3.org/2000/svg" width="720" height="660" viewBox="0 0 720 660">
  <rect width="720" height="660" fill="#0d1117"/>
  <rect x="0" y="0" width="4" height="168" fill="#d4af37" opacity="0.6"/>
  <text x="72" y="30" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.12em">ABOUT ME</text>
  <text x="72" y="48" font-family="sans-serif" font-size="12" fill="#b1bac4">Exploring the intersection between technology, consciousness and</text>
  <text x="72" y="66" font-family="sans-serif" font-size="12" fill="#b1bac4">existential sovereignty.</text>
  <text x="72" y="88" font-family="sans-serif" font-size="11" fill="#8b949e">Solutions architecture and software engineering—designing systems that</text>
  <text x="72" y="106" font-family="sans-serif" font-size="11" fill="#8b949e">are resilient and aligned with life. Digital sovereignty and resilient</text>
  <text x="72" y="124" font-family="sans-serif" font-size="11" fill="#8b949e">systems sit at the centre of the practice; the thread is clarity and</text>
  <text x="72" y="142" font-family="sans-serif" font-size="11" fill="#8b949e">presence in how we build and advise. Focus on mind-life integration,</text>
  <text x="72" y="160" font-family="sans-serif" font-size="11" fill="#8b949e">nature and living systems—where technical depth meets integration.</text>
  <line x1="72" y1="176" x2="648" y2="176" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="186" width="4" height="132" fill="#22c55e" opacity="0.5"/>
  <text x="72" y="208" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.12em">TECH AND PRACTICE</text>
  <text x="72" y="234" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Architecture</text>
  <text x="72" y="252" font-family="sans-serif" font-size="12" fill="#b1bac4">Systems design, resilient and</text>
  <text x="72" y="268" font-family="sans-serif" font-size="12" fill="#b1bac4">sovereign systems</text>
  <text x="264" y="234" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Engineering</text>
  <text x="264" y="252" font-family="sans-serif" font-size="12" fill="#b1bac4">Software solutions,</text>
  <text x="264" y="268" font-family="sans-serif" font-size="12" fill="#b1bac4">consulting</text>
  <text x="456" y="234" font-family="sans-serif" font-size="13" fill="#22c55e" font-weight="600">Consciousness</text>
  <text x="456" y="252" font-family="sans-serif" font-size="12" fill="#b1bac4">Integration, life systems,</text>
  <text x="456" y="268" font-family="sans-serif" font-size="12" fill="#b1bac4">conversations</text>
  <line x1="72" y1="284" x2="648" y2="284" stroke="#30363d" stroke-width="1"/>
  <rect x="0" y="294" width="4" height="318" fill="#15803d" opacity="0.4"/>
  <text x="72" y="318" font-family="sans-serif" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.12em">FOCUS AREAS</text>
  <rect x="72" y="332" width="576" height="72" fill="#161b22" rx="4" stroke="#30363d" stroke-width="0.5"/>
  <rect x="72" y="332" width="3" height="72" fill="#22c55e" rx="1"/>
  <text x="84" y="362" font-family="sans-serif" font-size="13" font-style="italic" fill="#b1bac4">Architecture and software engineering for meaningful digital systems.</text>
  <text x="640" y="382" text-anchor="end" font-family="sans-serif" font-size="10" fill="#8b949e">Solutions and Engineering</text>
  <rect x="72" y="414" width="576" height="72" fill="#161b22" rx="4" stroke="#30363d" stroke-width="0.5"/>
  <rect x="72" y="414" width="3" height="72" fill="#15803d" rx="1"/>
  <text x="84" y="444" font-family="sans-serif" font-size="13" font-style="italic" fill="#b1bac4">Resilient systems, sovereignty and sustainable tech.</text>
  <text x="640" y="464" text-anchor="end" font-family="sans-serif" font-size="10" fill="#8b949e">Digital Sovereignty</text>
  <rect x="72" y="496" width="576" height="72" fill="#161b22" rx="4" stroke="#30363d" stroke-width="0.5"/>
  <rect x="72" y="496" width="3" height="72" fill="#4ade80" rx="1"/>
  <text x="84" y="526" font-family="sans-serif" font-size="13" font-style="italic" fill="#b1bac4">Conversations and practice around mind, life and integration.</text>
  <text x="640" y="546" text-anchor="end" font-family="sans-serif" font-size="10" fill="#8b949e">Consciousness and Integration</text>
</svg>
