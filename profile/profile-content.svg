  <text x="264" y="298" font-family="sans-serif" font-size="13" fill="#b1bac4">consulting</text>
  <text x="456" y="254" font-family="sans-serif" font-size="14" fill="#22c55e" font-weight="600">Consciousness</text>
  <text x="456" y="278" font-family="sans-serif" font-size="13" fill="#b1bac4">Integration, life systems,</text>
  <text x="456" y="298" font-family="sans-serif" font-size="13" fill="#b1bac4">conversations</text>
