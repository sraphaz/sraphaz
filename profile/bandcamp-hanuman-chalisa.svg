<svg xmlns="http://www.w3.org/2000/svg" width="400" height="42" viewBox="0 0 400 42" role="img" aria-label="Hanuman Chalisa by Víctor Sakshin on Bandcamp — click to play">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
  </defs>
  <!-- Bar background (Bandcamp #333) -->
  <rect width="400" height="42" fill="url(#bg)" rx="4"/>
  <!-- Play button -->
  <g transform="translate(12, 9)">
    <circle cx="12" cy="12" r="11" fill="#1DA0C3" opacity="0.95"/>
    <path d="M9 7 L9 17 L18 12 Z" fill="#fff"/>
  </g>
  <!-- Vertical separator (like embed) -->
  <line x1="46" y1="8" x2="46" y2="34" stroke="#444" stroke-width="1"/>
  <!-- Track title (green like Bandcamp) -->
  <text x="52" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2ebd35">Hanuman Chalisa — ?????? ??????</text>
  <!-- Artist -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#9ca3af">by Víctor Sakshin</text>
  <!-- Bandcamp hint right -->
  <text x="378" y="26" font-family="system-ui, sans-serif" font-size="10" fill="#2ebd35" text-anchor="end">Bandcamp</text>
</svg>
