<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" style="background-color:#0d1117">
  <defs>
    <!-- Indian geometric pattern: repeating diamond (lozenge) -->
    <pattern id="gold-pattern" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 7 0 L 14 7 L 7 14 L 0 7 Z" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.9"/>
      <path d="M 7 2 L 12 7 L 7 12 L 2 7 Z" fill="none" stroke="#b8860b" stroke-width="0.4" opacity="0.7"/>
    </pattern>
  </defs>
  <rect width="720" height="240" fill="#0d1117"/>
  <!-- Golden frame: symmetric outer and inner border -->
  <rect x="0" y="0" width="720" height="240" fill="none" stroke="#d4af37" stroke-width="2" rx="2" opacity="0.95"/>
  <rect x="8" y="8" width="704" height="224" fill="none" stroke="#b8860b" stroke-width="0.8" rx="1" opacity="0.8"/>
  <!-- Patterned border strips (Indian geometric) - 8px symmetric margin -->
  <rect x="0" y="0" width="720" height="8" fill="url(#gold-pattern)"/>
  <rect x="0" y="232" width="720" height="8" fill="url(#gold-pattern)"/>
  <rect x="0" y="8" width="8" height="224" fill="url(#gold-pattern)"/>
  <rect x="712" y="8" width="8" height="224" fill="url(#gold-pattern)"/>
  <!-- Verse line 1 (fade-in) - golden shadow only on Sanskrit -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
    <g transform="translate(0.8, 0.8)">
      <text x="360" y="50" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#d4af37" stroke="#b8860b" stroke-width="0.6" paint-order="stroke fill" opacity="0.85" style="letter-spacing: 1.5; word-spacing: 6">&#2348;&#2369;&#2342;&#2381;&#2341;&#2367;&#2352;&#2381;&#2348;&#2354;&#2306; &#2351;&#2358;&#2379; &#2341;&#2376;&#2352;&#2381;&#2351;&#2306; &#2344;&#2367;&#2352;&#2381;&#2342;&#2361;&#2351;&#2340;&#2381;&#2357;&#2350;&#2352;&#2379;&#2327;&#2340;&#2366; &#2404;</text>
    </g>
    <text x="360" y="50" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#14532d" stroke="#d4af37" stroke-width="0.5" paint-order="stroke fill" style="letter-spacing: 1.5; word-spacing: 6">&#2348;&#2369;&#2342;&#2381;&#2341;&#2367;&#2352;&#2381;&#2348;&#2354;&#2306; &#2351;&#2358;&#2379; &#2341;&#2376;&#2352;&#2381;&#2351;&#2306; &#2344;&#2367;&#2352;&#2381;&#2342;&#2361;&#2351;&#2340;&#2381;&#2357;&#2350;&#2352;&#2379;&#2327;&#2340;&#2366; &#2404;</text>
  </g>
  <!-- Verse line 2 (fade-in) - golden shadow only on Sanskrit -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>
    <g transform="translate(0.8, 0.8)">
      <text x="360" y="92" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#d4af37" stroke="#b8860b" stroke-width="0.6" paint-order="stroke fill" opacity="0.85" style="letter-spacing: 1.5; word-spacing: 6">&#2310;&#2332;&#2366;&#2335;&#2381;&#2351;&#2306; &#2357;&#2366;&#2325;&#2381;&#2346;&#2337;&#2369;&#2340;&#2381;&#2357;&#2306; &#2330; &#2361;&#2344;&#2369;&#2350;&#2340;&#2381;&#2360;&#2381;&#2350;&#2352;&#2339;&#2366;&#2342;&#2381;&#2342;&#2357;&#2375;&#2340;&#2381; &#2405;</text>
    </g>
    <text x="360" y="92" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#14532d" stroke="#d4af37" stroke-width="0.5" paint-order="stroke fill" style="letter-spacing: 1.5; word-spacing: 6">&#2310;&#2332;&#2366;&#2335;&#2381;&#2351;&#2306; &#2357;&#2366;&#2325;&#2381;&#2346;&#2337;&#2369;&#2340;&#2381;&#2357;&#2306; &#2330; &#2361;&#2344;&#2369;&#2350;&#2340;&#2381;&#2360;&#2381;&#2350;&#2352;&#2339;&#2366;&#2342;&#2381;&#2342;&#2357;&#2375;&#2340;&#2381; &#2405;</text>
  </g>
  <!-- Transliteration (fade-in) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.85s" fill="freeze"/>
    <text x="360" y="122" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#166534" style="letter-spacing: 1; word-spacing: 4">buddhir balam yaso dhairyam nirbhayatvam arogata |</text>
    <text x="360" y="148" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#166534" style="letter-spacing: 1; word-spacing: 4">ajadhyam vakpatutvam ca hanumat-smaranad bhavet ||</text>
  </g>
  <!-- Meanings (fade-in) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
    <text x="360" y="188" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8fbc8f" style="letter-spacing: 0; word-spacing: 1">Wisdom - Strength - Recognition - Courage - Fearlessness - Health - Freedom from Laziness - Eloquence</text>
  </g>
  <!-- Blessing line (fade-in) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.55s" fill="freeze"/>
    <text x="360" y="210" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#9caf88" style="letter-spacing: 0.3; word-spacing: 2">Blessings from remembering Lord Hanuman</text>
  </g>
</svg>
