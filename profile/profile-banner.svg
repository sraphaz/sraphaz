<svg width="1150" height="360" viewBox="0 0 1150 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile banner — systems, territory, sovereignty">
  <defs>
    <!-- Green palette: same hue family, 5 levels for visual division (hero → sections → body → accent → footer) -->
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1150" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060C12"/>
      <stop offset="0.4" stop-color="#081018"/>
      <stop offset="1" stop-color="#0D1319"/>
    </linearGradient>
    <linearGradient id="banner-line" x1="80" y1="0" x2="1070" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#94A3B8" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#C2A85A" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#94A3B8" stop-opacity="0.4"/>
      <stop offset="0.55" stop-color="#C2A85A" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1150" height="360" rx="14" fill="url(#banner-bg)"/>
  <!-- Subtle topographic layer -->
  <g stroke="#94A3B8" stroke-width="0.5" fill="none" opacity="0.05">
    <path d="M 0 230 Q 288 210 575 226 T 1150 220"/>
    <path d="M 0 270 Q 288 250 575 266 T 1150 260"/>
    <path d="M 0 310 Q 288 290 575 306 T 1150 300"/>
  </g>
  <g stroke="#94A3B8" stroke-width="0.35" fill="none" opacity="0.03">
    <path d="M 160 0 L 160 360"/>
    <path d="M 990 0 L 990 360"/>
  </g>
  <!-- Top axis — hero green (lightest) -->
  <text x="575" y="58" text-anchor="middle" fill="#8BA38B" font-size="30" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" letter-spacing="0.03em">Solution Architecture • AI • Consciousness • Digital Sovereignty</text>
  <!-- Conceptual line — bridge tone (section level) -->
  <text x="575" y="98" text-anchor="middle" fill="#6E866E" font-size="20" font-family="Inter, system-ui, sans-serif" font-weight="400" letter-spacing="0.02em">Designing resilient digital systems aligned with life</text>
  <!-- Divider -->
  <line x1="80" y1="132" x2="1070" y2="132" stroke="url(#banner-line)" stroke-width="1"/>
  <!-- Section: Architecture (fade-in) — section title green, body green -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.55s" begin="0.25s" fill="freeze"/>
    <text x="230" y="186" text-anchor="middle" fill="#728F72" font-size="24" font-family="Inter, system-ui, sans-serif" font-weight="600" letter-spacing="0.02em">Architecture</text>
    <text x="230" y="228" text-anchor="middle" fill="#5A6A5A" font-size="18" font-family="Inter, system-ui, sans-serif" font-weight="400">
      <tspan x="230" dy="0">Systems design for meaningful</tspan>
      <tspan x="230" dy="1.35em">digital environments</tspan>
    </text>
  </g>
  <!-- Section: Intelligence (fade-in) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.55s" begin="0.5s" fill="freeze"/>
    <text x="575" y="186" text-anchor="middle" fill="#728F72" font-size="24" font-family="Inter, system-ui, sans-serif" font-weight="600" letter-spacing="0.02em">Intelligence</text>
    <text x="575" y="228" text-anchor="middle" fill="#5A6A5A" font-size="18" font-family="Inter, system-ui, sans-serif" font-weight="400">
      <tspan x="575" dy="0">AI, consciousness, software</tspan>
      <tspan x="575" dy="1.35em">engineering and adaptive systems</tspan>
    </text>
  </g>
  <!-- Section: Territory (fade-in) — accent green for Arah -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.55s" begin="0.75s" fill="freeze"/>
    <text x="920" y="186" text-anchor="middle" fill="#728F72" font-size="24" font-family="Inter, system-ui, sans-serif" font-weight="600" letter-spacing="0.02em">Territory</text>
    <text x="920" y="228" text-anchor="middle" fill="#5A6A5A" font-size="18" font-family="Inter, system-ui, sans-serif" font-weight="400">
      <tspan x="920" dy="0"><tspan fill="#6B8B6B">Arah</tspan><tspan fill="#5A6A5A"> — territory-first digital</tspan></tspan>
      <tspan x="920" dy="1.35em" fill="#5A6A5A">platform for regenerative communities</tspan>
    </text>
  </g>
  <!-- Bottom band — footer green (softest, clear division) -->
  <line x1="80" y1="268" x2="1070" y2="268" stroke="url(#banner-line)" stroke-width="0.8" opacity="0.6"/>
  <text x="575" y="322" text-anchor="middle" fill="#5A6A5A" font-size="16" font-family="Inter, system-ui, sans-serif" font-weight="400" letter-spacing="0.08em" opacity="0.95">Technology · Consciousness · Living Systems</text>
</svg>
