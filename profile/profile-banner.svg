<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile banner">
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="720" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F14"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="banner-line" x1="120" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7BD389" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7BD389" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7BD389" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="720" height="180" rx="16" fill="url(#banner-bg)"/>
  <text x="360" y="36" text-anchor="middle" fill="#A7B0BE" font-size="16" font-family="Inter, system-ui, sans-serif" font-weight="500" letter-spacing="0.15">Systems Architecture • AI • Digital Sovereignty</text>
  <line x1="120" y1="68" x2="600" y2="68" stroke="url(#banner-line)" stroke-width="1"/>
  <text x="360" y="98" text-anchor="middle" fill="#7BD389" font-size="20" font-family="Inter, system-ui, sans-serif" font-weight="600">Arah</text>
  <text x="360" y="128" text-anchor="middle" fill="#A7B0BE" font-size="13" font-family="Inter, system-ui, sans-serif" font-weight="400">Territory-first digital platform for regenerative local communities</text>
</svg>
