# Gera os cards de GitHub Stats e Top Languages como SVG no repo.
# Stats usa gerador local com queries GraphQL divididas (evita RESOURCE_LIMITS_EXCEEDED
# do mega-query do github-readme-stats em contas ativas).

name: Update README stats cards

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC (9h BRT)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (split GraphQL)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATS_USERNAME: ${{ github.repository_owner }}
          STATS_OUTPUT: profile/stats.svg
        run: python3 .github/scripts/generate-stats-card.py

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical&hide_border=true&bg_color=0d1117&title_color=6e5494
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject error SVGs
        run: |
          set -euo pipefail
          for file in profile/stats.svg profile/top-langs.svg; do
            if grep -Eqi 'Something went wrong|Resource limits for this query exceeded|Maximum retries exceeded' "$file"; then
              echo "::error::Refusing to commit error SVG: $file"
              exit 1
            fi
            if ! grep -q '<svg' "$file"; then
              echo "::error::Missing SVG markup in $file"
              exit 1
            fi
          done
          echo "SVG cards look valid"

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update README stats cards"
            git push
          fi
