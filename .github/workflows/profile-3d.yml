# Gera o gráfico 3D de contribuições do GitHub (estilo git-page-3d-infographic)
# Temas disponíveis: profile-green, profile-season, profile-night-view, profile-gitblock, etc.
# Para tema customizado (ex: Mysterious Dark Purple & Gold), use SETTING_JSON com um .json em sample-settings

name: GitHub-Profile-3D-Contrib

on:
  schedule: # 03:00 JST == 18:00 UTC (pode ajustar para sua timezone)
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          # Para tema roxo/dourado customizado, descomente e crie profile-3d-settings.json:
          # SETTING_JSON: profile-3d-settings.json
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "chore: update 3D contribution graph"; then
            git push
          fi
